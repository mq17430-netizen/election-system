<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار معالجة الصور الرقمية</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:Arial,sans-serif;min-height:100vh}

/* LOGIN */
#login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;background:#0d1117}
.lcard{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:500px;text-align:center}
.lcard h1{font-size:1.5rem;color:#58a6ff;margin-bottom:0.3rem}
.lcard p{font-size:0.9rem;color:#8b949e;margin-bottom:1.5rem}
.lcard input{width:100%;padding:12px;border-radius:10px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:1rem;text-align:center;outline:none;margin-bottom:1rem;font-family:Arial,sans-serif}
.lcard input:focus{border-color:#58a6ff}
.lcard button{width:100%;padding:13px;border-radius:10px;border:none;background:#58a6ff;color:#0d1117;font-size:1rem;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}
.lcard button:hover{background:#79b8ff}
.lb-wrap{margin-top:1.5rem;text-align:right}
.lb-wrap h3{color:#f0c040;font-size:0.95rem;margin-bottom:0.75rem}
.lb-table{width:100%;border-collapse:collapse;font-size:0.85rem}
.lb-table th{color:#8b949e;padding:6px 8px;border-bottom:1px solid #30363d;text-align:center}
.lb-table td{padding:7px 8px;border-bottom:1px solid #21262d;text-align:center}

/* HEADER */
#quiz-page{display:none}
.qheader{position:sticky;top:0;z-index:99;background:#161b22;border-bottom:1px solid #30363d;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.qheader-name{font-size:0.85rem;color:#8b949e;min-width:120px}
.qheader-name b{color:#e6edf3}
.prog-bar{flex:1;height:6px;background:#21262d;border-radius:3px;overflow:hidden;min-width:60px}
.prog-fill{height:100%;background:#3fb950;border-radius:3px;transition:width 0.3s;width:0%}
.score-pill{background:#0d1117;border:1px solid #30363d;border-radius:20px;padding:5px 14px;font-size:0.85rem;white-space:nowrap}
.score-pill b{color:#3fb950;font-size:1.1rem}

/* QUESTIONS */
.qbody{max-width:820px;margin:0 auto;padding:1.5rem 1rem 5rem}
.qcard{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.qnum{font-size:0.75rem;color:#8b949e;margin-bottom:0.5rem}
.qtext{font-size:0.97rem;font-weight:600;line-height:1.7;margin-bottom:1rem;color:#e6edf3}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border:1px solid #30363d;border-radius:9px;cursor:pointer;font-size:0.88rem;line-height:1.5;background:#1c2128;transition:background 0.15s,border-color 0.15s;user-select:none}
.opt:hover:not(.locked){background:#2d333b;border-color:#58a6ff}
.olabel{min-width:24px;height:24px;border-radius:50%;background:#30363d;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;flex-shrink:0;margin-top:1px;color:#8b949e}
.opt.correct{background:#0d2818;border-color:#3fb950}
.opt.correct .olabel{background:#3fb950;color:#000}
.opt.wrong{background:#2a0f0f;border-color:#f85149}
.opt.wrong .olabel{background:#f85149;color:#fff}
.opt.reveal{background:#0d2818;border-color:#3fb950}
.opt.reveal .olabel{background:#3fb950;color:#000}
.opt.locked{cursor:default}
.fb{display:none;margin-top:0.75rem;padding:8px 12px;border-radius:8px;font-size:0.85rem;font-weight:600}
.fb.show{display:block}
.fb.ok{background:#0d2818;color:#3fb950}
.fb.no{background:#2a0f0f;color:#f85149}

/* FINISH OVERLAY */
#finish{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.88);align-items:center;justify-content:center}
#finish.show{display:flex}
.fcard{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:2.5rem 2rem;max-width:420px;width:90%;text-align:center}
.fcard .emoji{font-size:3rem;margin-bottom:1rem}
.fcard .fname{font-size:1rem;color:#8b949e;margin-bottom:0.3rem}
.fcard .fscore{font-size:3.5rem;font-weight:900;color:#3fb950;line-height:1}
.fcard .fof{font-size:0.9rem;color:#8b949e;margin-bottom:0.5rem}
.fcard .fpct{font-size:1.5rem;font-weight:700;color:#58a6ff;margin-bottom:0.3rem}
.fcard .fgrade{font-size:0.9rem;color:#8b949e;margin-bottom:1.5rem}
.fbtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.fbtn{padding:10px 22px;border-radius:9px;border:1px solid #30363d;background:transparent;color:#e6edf3;font-size:0.9rem;cursor:pointer;font-family:Arial,sans-serif}
.fbtn:hover{background:#21262d}
.fbtn.pr{background:#58a6ff;color:#000;border-color:#58a6ff;font-weight:700}
.fbtn.pr:hover{background:#79b8ff}

/* FOOTER */
footer{text-align:center;padding:1.5rem;color:#8b949e;font-size:0.82rem;border-top:1px solid #21262d;margin-top:2rem}
footer span{color:#58a6ff;font-weight:700}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="lcard">
    <div style="font-size:2.5rem;margin-bottom:0.75rem">🎓</div>
    <h1>معالجة الصور الرقمية</h1>
    <p>بنك الأسئلة — 245 سؤال تفاعلي</p>
    <input type="text" id="name-in" placeholder="أدخل اسمك هنا..." maxlength="50">
    <button onclick="startQuiz()">ابدأ الاختبار ←</button>
    <div class="lb-wrap" id="lb-wrap" style="display:none">
      <h3>🏆 نتائج الطلاب السابقين</h3>
      <table class="lb-table">
        <thead><tr><th>#</th><th>الاسم</th><th>الدرجة / 245</th><th>%</th></tr></thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz-page">
  <div class="qheader">
    <div class="qheader-name">الطالب: <b id="hname">-</b></div>
    <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
    <div class="score-pill">الدرجة: <b id="sc">0</b> / 245</div>
  </div>
  <div class="qbody" id="qbody"></div>
  <footer>جميع حقوق البرمجة محفوظة &copy; <span>المهندس مختار قاسم</span></footer>
</div>

<!-- FINISH -->
<div id="finish">
  <div class="fcard">
    <div class="emoji" id="fin-em">🏅</div>
    <div class="fname" id="fin-nm"></div>
    <div class="fscore" id="fin-sc"></div>
    <div class="fof">من 245 درجة</div>
    <div class="fpct" id="fin-pct"></div>
    <div class="fgrade" id="fin-gr"></div>
    <div class="fbtns">
      <button class="fbtn pr" onclick="goLogin()">الصفحة الرئيسية</button>
      <button class="fbtn" onclick="closeFinish()">مراجعة الإجابات</button>
    </div>
  </div>
</div>

var LB=[];
var userName='';
var score=0;
var answered={};
var L=['A','B','C','D'];

function loadLB(){
  try{ LB=JSON.parse(localStorage.getItem('dip_lb')||'[]'); }
  catch(e){ LB=[]; }
}
function saveLB(){
  try{ localStorage.setItem('dip_lb',JSON.stringify(LB)); }catch(e){}
}
function renderLB(){
  loadLB();
  if(LB.length===0){ document.getElementById('lb-wrap').style.display='none'; return; }
  document.getElementById('lb-wrap').style.display='';
  var html='';
  var top=LB.slice(0,10);
  for(var i=0;i<top.length;i++){
    var e=top[i];
    var pct=Math.round(e.s/245*100);
    var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    var c=i<3?'color:'+(i===0?'#f0c040':i===1?'#c0c0c0':'#cd7f32')+';font-weight:700':'';
    html+='<tr><td style="'+c+'">'+m+'</td><td style="'+c+'">'+e.n+'</td><td style="'+c+'">'+e.s+'</td><td style="color:#8b949e">'+pct+'%</td></tr>';
  }
  document.getElementById('lb-body').innerHTML=html;
}

function startQuiz(){
  var n=document.getElementById('name-in').value.trim();
  if(!n){ document.getElementById('name-in').style.borderColor='#f85149'; document.getElementById('name-in').focus(); return; }
  userName=n; score=0; answered={};
  document.getElementById('login-page').style.display='none';
  document.getElementById('quiz-page').style.display='block';
  document.getElementById('hname').textContent=n;
  buildQuiz();
}

function buildQuiz(){
  var html='';
  for(var i=0;i<Q.length;i++){
    var q=Q[i];
    var opts='';
    for(var j=0;j<q.o.length;j++){
      opts+='<div class="opt" id="o'+i+'_'+j+'" onclick="choose('+i+','+j+')"><span class="olabel">'+L[j]+'</span><span>'+q.o[j]+'</span></div>';
    }
    html+='<div class="qcard" id="qc'+i+'"><div class="qnum">سؤال '+(i+1)+' من '+Q.length+'</div><div class="qtext">'+q.q+'</div><div class="opts">'+opts+'</div><div class="fb" id="fb'+i+'"></div></div>';
  }
  document.getElementById('qbody').innerHTML=html;
}

function choose(qi,oi){
  if(answered[qi]!==undefined) return;
  answered[qi]=oi;
  var q=Q[qi];
  var ok=(oi===q.a);
  for(var j=0;j<q.o.length;j++){
    var el=document.getElementById('o'+qi+'_'+j);
    el.classList.add('locked');
    if(j===q.a) el.classList.add('reveal');
    if(j===oi&&!ok) el.classList.add('wrong');
    if(j===oi&&ok){ el.classList.remove('reveal'); el.classList.add('correct'); }
  }
  var fb=document.getElementById('fb'+qi);
  if(ok){
    score++;
    fb.className='fb show ok';
    fb.innerHTML='✓ إجابة صحيحة!';
  } else {
    fb.className='fb show no';
    fb.innerHTML='✗ خطأ — الصحيح: '+L[q.a]+') '+q.o[q.a];
  }
  document.getElementById('sc').textContent=score;
  var done=Object.keys(answered).length;
  document.getElementById('prog').style.width=Math.round(done/Q.length*100)+'%';
  if(done===Q.length) setTimeout(showFinish,700);
}

function showFinish(){
  loadLB();
  LB.push({n:userName,s:score});
  LB.sort(function(a,b){return b.s-a.s;});
  saveLB();
  var pct=Math.round(score/Q.length*100);
  var grade,em;
  if(pct>=90){grade='ممتاز 🌟';em='🏆';}
  else if(pct>=75){grade='جيد جداً 👍';em='🥇';}
  else if(pct>=60){grade='جيد';em='🎓';}
  else{grade='يحتاج مراجعة 📚';em='📖';}
  document.getElementById('fin-em').textContent=em;
  document.getElementById('fin-nm').textContent=userName;
  document.getElementById('fin-sc').textContent=score;
  document.getElementById('fin-pct').textContent=pct+'%';
  document.getElementById('fin-gr').textContent=grade;
  document.getElementById('finish').style.display='flex';
}

function goLogin(){
  document.getElementById('finish').style.display='none';
  document.getElementById('quiz-page').style.display='none';
  document.getElementById('login-page').style.display='flex';
  document.getElementById('name-in').value='';
  document.getElementById('name-in').style.borderColor='';
  renderLB();
}

function closeFinish(){
  document.getElementById('finish').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('name-in').addEventListener('keydown',function(e){
  if(e.key==='Enter') startQuiz();
});

renderLB();
</script>
